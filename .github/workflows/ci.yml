name: CI

# Corre en cada PR y en cada push a main. Pensado para marcarse como
# required status check sobre main (Settings → Branches → Branch protection):
# el check a marcar como requerido se llama "Tests y build" (el name del job).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Tests y build
    runs-on: ubuntu-latest
    timeout-minutes: 10 # red de seguridad ante un cuelgue; el build real tarda ~1 min
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
