name: E2E

# Smoke E2E (Playwright) del loop principal. Va en un workflow APARTE del de
# "Tests y build" (ci.yml) a propósito: necesita navegador y arranca el dev
# server, así que no debe formar parte del required status check sobre main.
# Corre en cada PR; informa, no bloquea (salvo que se marque como requerido).
on:
  pull_request:

jobs:
  e2e:
    name: Smoke E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Instala solo Chromium + sus dependencias de sistema.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
